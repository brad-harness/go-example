pipeline:
  clone: true
  description: Auto-generated CI pipeline
  identifier: go_example_ci
  name: go-example CI
  orgIdentifier: default
  projectIdentifier: a4
  stages:
    - steps:
        - parallel:
            steps:
              - run:
                  container: golang:1.25.3
                  script: go build -o pastebin .
              - run:
                  container: golang:1.25.3
                  script: |-
                    curl -fSsL -o /tmp/hcli https://storage.googleapis.com/harness-ti/hcli/vv0.6/hcli-linux-amd64
                    chmod 755 /tmp/hcli
                    echo "$HARNESS_TI_SERVICE_TOKEN" | base64
                    go test -coverprofile=coverage.out ./...
                    /tmp/hcli cov  upload --file coverage.out --api-key="$(echo $HARNESS_TI_SERVICE_TOKEN | base64 -d)" --endpoint="https://qa.harness.io/gateway/ti-service/coverage"
